<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday, Arin!</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="sky-glow sky-glow-left" aria-hidden="true"></div>
  <div class="sky-glow sky-glow-right" aria-hidden="true"></div>

  <main class="page-shell">
    <section class="hero-card">
      <p class="eyebrow">A Super Amazing and Cool Birthday SURPIRSE for Miss Arin</p>
      <h1>Happy Birthday, Arin!</h1>
      <p class="intro">
        Blow your Birthday candle out. 
      </p>

      <div class="cake-stage" id="cake-stage">
        <div class="sparkles" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="cake-wrapper">
          <div class="candle">
            <div class="wick"></div>
            <div class="smoke" id="smoke" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="flame-wrap" id="flame-wrap">
              <div class="flame-core"></div>
              <div class="flame-outer"></div>
            </div>
          </div>

          <div class="cake">
            <div class="frosting-top">
              <span class="sprinkle sprinkle-a"></span>
              <span class="sprinkle sprinkle-b"></span>
              <span class="sprinkle sprinkle-c"></span>
              <span class="sprinkle sprinkle-d"></span>
              <span class="sprinkle sprinkle-e"></span>
              <span class="sprinkle sprinkle-f"></span>
            </div>
            <div class="cake-side">
              <span class="drip drip-a"></span>
              <span class="drip drip-b"></span>
              <span class="drip drip-c"></span>
            </div>
            <div class="plate"></div>
          </div>
        </div>
      </div>

      <div class="meter-wrap" aria-hidden="true">
        <div class="meter-label">Birthday breeze</div>
        <div class="meter">
          <div class="meter-fill" id="meter-fill"></div>
        </div>
      </div>

      <p class="status-text" id="status-text">Move your mouse around the flame to blow it out.</p>

      <button class="birthday-button" id="celebrate-button" type="button">
        Secret Surpirse...
      </button>

      <p class="wish-text" id="wish-text">Celebrate YOUR birthday, Arin!</p>
    </section>
  </main>

  <div class="confetti-layer" id="confetti-layer" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
